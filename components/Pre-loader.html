<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Workspace Hub</title>
  
  <!-- LINK THE LOCAL STYLE SHEET DIRECTLY -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-preloader-shroud">
  <div class="loader-centerpiece">
    
    <!-- HIGH-FIDELITY RADAR NODE MULTIVERSE MODULE -->
    <div class="cyber-radar-matrix">
      <!-- Outer Orbiting Tracks -->
      <div class="radar-orbit-ring ring-outer">
        <span class="orbit-drifting-node neon-cyan"></span>
      </div>
      <div class="radar-orbit-ring ring-mid">
        <span class="orbit-drifting-node neon-emerald"></span>
      </div>
      <div class="radar-orbit-ring ring-inner"></div>
      
      <!-- Central Molecule Connection Framework Grid -->
      <div class="central-molecule-hub">
        <div class="molecule-line vertical-line"></div>
        <div class="molecule-line cross-line-left"></div>
        <div class="molecule-line cross-line-right"></div>
        
        <!-- Peripheral Core Connection Nodes -->
        <span class="molecule-node pos-top neon-purple"></span>
        <span class="molecule-node pos-top-right neon-emerald"></span>
        <span class="molecule-node pos-bottom-right neon-purple"></span>
        <span class="molecule-node pos-bottom neon-emerald"></span>
        <span class="molecule-node pos-bottom-left neon-cyan"></span>
        <span class="molecule-node pos-top-left neon-cyan"></span>
        
        
        <div class="molecule-core-badge">
          <img src="./Assests/home/stackly-icon-only (1).webp" alt="Logo" class="molecule-brand-vector" onerror="this.style.visibility='hidden';" />
        </div>
      </div>
    </div>

    <!-- TYPOGRAPHY INFRASTRUCTURE LABELS -->
    <div class="loader-brand-label">Stackly</div>
    
    <div class="loader-status-ticker">
      <span class="radar-status-pulse"></span> INITIALIZING AGENTS
    </div>
    
    <!-- GRADIENT SYSTEM TIMELINE LOADING PROGRESS BAR -->
    <div class="loader-progress-track">
      <div class="loader-progress-fill-bar"></div>
    </div>

  </div>
</div>
