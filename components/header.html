<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Workspace Hub</title>
  
  <!-- LINK THE LOCAL STYLE SHEET DIRECTLY -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="global-header">
  <div class="nav-container">
    
    <!-- BRAND IMAGE LINK LOCKUP -->
    <a href="index.html" class="logo-container">
      <img src="./Assests/home/stackly-logo-cyan (1).png" alt="Stackly" class="header-brand-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
      <!-- Fallback plain text layer rules if your local webp path breaks -->
      <span class="logo-text-fallback" style="display: none;">Stackly<span class="logo-accent">Corp</span></span>
    </a>

    <!-- SYSTEM HORIZONTAL NAVIGATION MENU -->
    <nav class="nav-menu" id="mobile-nav-overlay">
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        
        <!-- DUAL SOLID UNIFORM BUTTONS ACCOUNTS ACTIONS -->
        <li class="auth-group">
          <a href="login.html" class="corp-btn corp-btn-auth-solid">Log In</a>
          <a href="register.html" class="corp-btn corp-btn-auth-solid">Sign Up</a>
        </li>
      </ul>
    </nav>

    <!-- MOBILE HAMBURGER TRIGGER ICON CONTROLS -->
    <button id="menu-toggle-trigger" class="mobile-menu-toggle" aria-label="Toggle Navigation">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>
    
  </div>
</header>


  
  <!-- --- SYSTEM INTERACTION EVENTS ENGINE SCRIPTS --- -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const navbar = document.querySelector('.global-header');
      const toggle = document.getElementById('menu-toggle-trigger');
      const menu = document.getElementById('mobile-nav-overlay');

      // 1. Transparent-to-Solid Scroll Transition Tracker
      window.addEventListener('scroll', () => {
        if (window.scrollY > 40) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      });

      // 2. Mobile Responsive Hamburg Drawer Menu Click Triggers
      if (toggle && menu) {
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.toggle('mobile-menu-active');
        });

        document.addEventListener('click', (e) => {
          if (!menu.contains(e.target) && !toggle.contains(e.target)) {
            menu.classList.remove('mobile-menu-active');
          }
        });
      }

      // 3. LUXURY PRELOADER HOLD DISMISS TIMER ENGINE (1.8 Seconds Display Frame Window)
      setTimeout(() => {
        const preloader = document.getElementById('app-preloader-shroud');
        if (preloader) {
          preloader.classList.add('shroud-clear');
        }
      }, 1800);
    });
  </script>
